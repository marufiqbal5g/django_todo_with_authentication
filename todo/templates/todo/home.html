{% extends 'todo/base.html' %}

{% block content %}

<div class="text-center">
    <h1 class="mb-4">Welcome to Todo App 🎯</h1>

    {% if user.is_authenticated %}
        <h4 class="mb-3">Hello, {{ user.username }} 👋</h4>
        <a href="{% url 'task_list' %}" class="btn btn-primary btn-lg">Go to My Todos</a>
    {% else %}
        <p class="mb-4">Manage your tasks efficiently.</p>
        <a href="{% url 'login' %}" class="btn btn-primary me-2">Login</a>
        <a href="{% url 'register' %}" class="btn btn-success">Register</a>
    {% endif %}
</div>

{% endblock %}
