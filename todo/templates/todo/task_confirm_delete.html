{% extends 'todo/base.html' %}

{% block content %}

<div class="text-center">
    <h3>Delete Task</h3>
    <p>Are you sure you want to delete "{{ task }}"?</p>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
