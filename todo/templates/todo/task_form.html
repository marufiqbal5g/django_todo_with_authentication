{% extends 'todo/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-3">Edit Task</h3>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100">Update</button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
